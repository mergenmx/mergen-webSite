      color: #e5e2e1;
    }

    .glass-card {
      background: rgba(10, 10, 10, 0.55);

    .blog-content p {

    .blog-content h2,
    .blog-content h3,
    .blog-content h4 {

      margin-bottom: 1rem;
      font-family: 'Space Grotesk', sans-serif;
      color: #e5e2e1;
      font-weight: 700;
    }

    .blog-content ul {
      margin: 1rem 0 1.5rem 1.25rem;
      list-style: disc;
      color: #bac9cc;
    }

    .blog-content li {
      margin-bottom: 0.65rem;
      line-height: 1.8;
    }

    .blog-content blockquote {
      margin: 2rem 0;
      padding: 1rem 1.25rem;
      border-left: 3px solid #00e5ff;
      background: rgba(255,255,255,0.02);
      color: #e5e2e1;
      font-style: italic;
    }

    .mobile-nav-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 0.95rem 1rem;
  color: #94a3b8;
  font-family: "Space Grotesk", sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 0.5rem;
  transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}

.mobile-nav-link:hover {
  background: rgba(255, 255, 255, 0.04);
  color: #ffffff;
  transform: translateX(4px);
}

.mobile-nav-link::after {
  content: "→";
  color: rgba(0, 229, 255, 0.75);
  font-size: 1rem;
}

.mobile-nav-link-active {
  color: #22d3ee;
  background: rgba(0, 229, 255, 0.08);
  border: 1px solid rgba(0, 229, 255, 0.14);
}

body.menu-open {
  overflow: hidden;
}
  </style>

<script async src="https://www.googletagmanager.com/gtag/js?id=AW-18077129832"></script>

</head>
<body>
  <nav class="fixed top-0 left-0 w-full z-50 bg-slate-950/30 backdrop-blur-md border-b border-cyan-500/10 shadow-[0_4px_30px_rgba(0,0,0,0.2)]">
  <div class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8 py-4 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 shrink-0">
      <button
        id="mobile-menu-btn"
        type="button"
        aria-label="Open menu"
        class="lg:hidden flex items-center justify-center w-10 h-10 rounded-md border border-cyan-500/20 bg-white/[0.03] text-cyan-400 hover:bg-white/5 transition-colors"
      >
        <span class="material-symbols-outlined text-[22px]">menu</span>
      </button>

      <a href="index.html" class="flex items-center gap-3 shrink-0">
        <img src="images/logo.jpg" alt="MergenMX logo" class="w-9 h-9 object-contain"/>
        <img src="images/mergen-text-logo.png" alt="MergenMX" class="h-6 md:h-7 object-contain"/>
      </a>
    </div>

    <div class="hidden lg:flex items-center gap-6 font-headline tracking-[0.18em] uppercase text-sm">
      <a class="text-slate-400 hover:text-white transition-colors px-2 py-1" href="index.html">Home</a>
      <a class="text-slate-400 hover:text-white transition-colors px-2 py-1" href="products.html">Products</a>
      <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1 px-2" href="blog.html">Blog</a>
      <a class="text-slate-400 hover:text-white transition-colors px-2 py-1" href="about.html">About</a>
      <a class="text-slate-400 hover:text-white transition-colors px-2 py-1" href="contact.html">Contact</a>
    </div>

    <div class="flex items-center shrink-0">
      <div class="flex items-center gap-1 border border-cyan-500/20 bg-white/[0.03] rounded-sm p-1">
        <button id="lang-en" type="button" class="text-cyan-400 text-xs font-headline tracking-[0.18em] uppercase px-3 py-1.5 rounded-sm bg-cyan-400/10 transition-colors">EN</button>
        <button id="lang-tr" type="button" class="text-cyan-400 text-xs font-headline tracking-[0.18em] uppercase px-3 py-1.5 rounded-sm hover:bg-white/5 transition-colors">TR</button>
      </div>
    </div>
  </div>
</nav>

<div
  id="mobile-menu-overlay"
  class="fixed inset-0 bg-black/55 backdrop-blur-[2px] z-[60] opacity-0 pointer-events-none transition-opacity duration-300"
></div>

<aside
  id="mobile-drawer"
  class="fixed top-0 left-0 h-full w-[82%] max-w-[320px] bg-[#0a0a0a] border-r border-cyan-500/15 z-[70] -translate-x-full transition-transform duration-300 ease-out shadow-[0_0_40px_rgba(0,0,0,0.45)]"
>
  <div class="flex items-center justify-between px-5 py-5 border-b border-cyan-500/10">
    <a href="index.html" class="flex items-center gap-3 shrink-0">
      <img src="images/logo.jpg" alt="MergenMX logo" class="w-9 h-9 object-contain"/>
      <img src="images/mergen-text-logo.png" alt="MergenMX" class="h-6 object-contain"/>
    </a>

    <button
      id="mobile-menu-close"
      type="button"
      aria-label="Close menu"
      class="flex items-center justify-center w-10 h-10 rounded-md text-cyan-400 hover:bg-white/5 transition-colors"
    >
      <span class="material-symbols-outlined text-[22px]">close</span>
    </button>
  </div>

  <nav class="px-3 py-4">
    <a href="index.html" class="mobile-nav-link">Home</a>
    <a href="products.html" class="mobile-nav-link">Products</a>
    <a href="blog.html" class="mobile-nav-link mobile-nav-link-active">Blog</a>
    <a href="about.html" class="mobile-nav-link">About</a>
    <a href="contact.html" class="mobile-nav-link">Contact</a>
  </nav>
</aside>

  <main class="pt-32 pb-24 px-6 md:px-12 max-w-4xl mx-auto">
    <a href="blog.html" class="inline-flex items-center gap-2 text-cyan-400 hover:text-white transition-colors mb-8">
      <span class="material-symbols-outlined">arrow_back</span>
      <span id="back-text">Back to blog</span>
    </a>

    <article class="glass-card rounded-xl overflow-hidden">
      
      <div class="p-6 md:p-10">
        <div id="blog-date" class="text-[11px] tracking-[0.18em] uppercase text-cyan-400/70 mb-4"></div>
        <h1 id="blog-title" class="text-3xl md:text-5xl font-bold font-headline mb-6"></h1>
        <p id="blog-desc" class="text-on-surface-variant text-lg leading-relaxed mb-10 text-[#bac9cc]"></p>
        <div id="blog-content" class="blog-content"></div>
      </div>
    </article>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGcKofiaxMlw_dYV5bsJOTDpCcdybNmF4",
        authDomain: "mergenmx-blog.firebaseapp.com",
        projectId: "mergenmx-blog",
        storageBucket: "mergenmx-blog.firebasestorage.app",
        messagingSenderId: "1067803884211",
        appId: "1:1067803884211:web:c307e051db4cc7a32e4ec6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentLang = "en";
    let currentBlog = null;

    function getLocalizedField(blog, fieldBase) {
      const langField = `${fieldBase}_${currentLang}`;
      const fallbackField = `${fieldBase}_en`;
      return blog[langField] || blog[fallbackField] || "";
    }


    function formatDate(dateString, lang = "en") {
      if (!dateString) return "";
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;

      return date.toLocaleDateString(lang === "tr" ? "tr-TR" : "en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function renderBlog() {
      if (!currentBlog) return;

      document.getElementById("blog-title").innerHTML = getLocalizedField(currentBlog, "title");
      document.getElementById("blog-desc").innerHTML = getLocalizedField(currentBlog, "desc");
      document.getElementById("blog-content").innerHTML = getLocalizedField(currentBlog, "content");
      document.getElementById("blog-date").innerHTML = formatDate(currentBlog.date, currentLang);
      document.getElementById("back-text").textContent = currentLang === "tr" ? "Bloga dön" : "Back to blog";

      document.title = `${getLocalizedField(currentBlog, "title")} | MergenMX`;
    }

    async function loadBlog() {
      const params = new URLSearchParams(window.location.search);
      const blogId = params.get("id");

      if (!blogId) {
        document.getElementById("blog-title").textContent = "Blog not found";
        return;
      }

      try {
        const docRef = doc(db, "blogs", blogId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          document.getElementById("blog-title").textContent = "Blog not found";
          return;
        }

        currentBlog = {
          id: docSnap.id,
          ...docSnap.data()
        };

        renderBlog();
      } catch (error) {
        console.error(error);
        document.getElementById("blog-title").textContent = "Error loading blog";
      }
    }

    const langEnBtn = document.getElementById("lang-en");
    const langTrBtn = document.getElementById("lang-tr");

    function applyLanguage(lang) {
      currentLang = lang.toLowerCase() === "tr" ? "tr" : "en";
      document.documentElement.lang = currentLang;

      if (currentLang === "tr") {
        langTrBtn.classList.add("bg-cyan-400/10");
        langTrBtn.classList.remove("hover:bg-white/5");
        langEnBtn.classList.remove("bg-cyan-400/10");
        langEnBtn.classList.add("hover:bg-white/5");
      } else {
        langEnBtn.classList.add("bg-cyan-400/10");
        langEnBtn.classList.remove("hover:bg-white/5");
        langTrBtn.classList.remove("bg-cyan-400/10");
        langTrBtn.classList.add("hover:bg-white/5");
      }

      renderBlog();
    }

    langEnBtn.addEventListener("click", () => applyLanguage("en"));
    langTrBtn.addEventListener("click", () => applyLanguage("tr"));

    applyLanguage("en");
    loadBlog();
  </script>
  <script>
  const mobileMenuBtn = document.getElementById('mobile-menu-btn');
  const mobileMenuClose = document.getElementById('mobile-menu-close');
  const mobileDrawer = document.getElementById('mobile-drawer');
  const mobileOverlay = document.getElementById('mobile-menu-overlay');

  function openMobileMenu() {
    mobileDrawer.classList.remove('-translate-x-full');
    mobileOverlay.classList.remove('opacity-0', 'pointer-events-none');
    document.body.classList.add('menu-open');
  }

  function closeMobileMenu() {
    mobileDrawer.classList.add('-translate-x-full');
    mobileOverlay.classList.add('opacity-0', 'pointer-events-none');
    document.body.classList.remove('menu-open');
  }

  if (mobileMenuBtn) mobileMenuBtn.addEventListener('click', openMobileMenu);
  if (mobileMenuClose) mobileMenuClose.addEventListener('click', closeMobileMenu);
  if (mobileOverlay) mobileOverlay.addEventListener('click', closeMobileMenu);

  document.querySelectorAll('#mobile-drawer a').forEach(link => {
    link.addEventListener('click', closeMobileMenu);
  });

  window.addEventListener('resize', () => {
    if (window.innerWidth >= 1024) {
      closeMobileMenu();
    }
  });
</script>
</body>
</html>
